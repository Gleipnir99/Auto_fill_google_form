<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#07060a"/>
  <!-- Wolf head -->
  <ellipse cx="16" cy="17" rx="8" ry="7" fill="#2a0808"/>
  <!-- Snout -->
  <ellipse cx="16" cy="21" rx="4.5" ry="3" fill="#1a0505"/>
  <!-- Left ear -->
  <polygon points="9,13 8,5 14,11" fill="#2a0808"/>
  <polygon points="10,12 9,7 13,11" fill="#3a1010"/>
  <!-- Right ear -->
  <polygon points="23,13 24,5 18,11" fill="#2a0808"/>
  <polygon points="22,12 23,7 19,11" fill="#3a1010"/>
  <!-- Eyes - ember glow -->
  <circle cx="13" cy="15" r="1.8" fill="#c85a1e"/>
  <circle cx="19" cy="15" r="1.8" fill="#c85a1e"/>
  <circle cx="13" cy="15" r="1"   fill="#ff7040"/>
  <circle cx="19" cy="15" r="1"   fill="#ff7040"/>
  <!-- Nose -->
  <ellipse cx="16" cy="20.5" rx="1.5" ry="1" fill="#0f0505"/>
  <!-- Outline glow -->
  <ellipse cx="16" cy="17" rx="8" ry="7" fill="none" stroke="#7a1e1e" stroke-width="0.8" opacity="0.6"/>
</svg>
