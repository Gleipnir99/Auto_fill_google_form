<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#07060a"/>
  <!-- Chain link 1 - horizontal -->
  <ellipse cx="11" cy="16" rx="7" ry="3.5" fill="none" stroke="#c8a84b" stroke-width="2.2"/>
  <!-- Chain link 2 - vertical -->
  <ellipse cx="22" cy="16" rx="3.5" ry="7" fill="none" stroke="#c8a84b" stroke-width="2.2"/>
  <!-- Connector -->
  <line x1="18" y1="16" x2="18.5" y2="16" stroke="#c8a84b" stroke-width="2"/>
  <!-- Gold glow tint -->
  <ellipse cx="11" cy="16" rx="7" ry="3.5" fill="none" stroke="#f0d070" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="22" cy="16" rx="3.5" ry="7" fill="none" stroke="#f0d070" stroke-width="0.5" opacity="0.4"/>
</svg>
